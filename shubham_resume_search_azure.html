
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#app { font-family: var(--font-sans); }
#home-screen { display: flex; flex-direction: column; align-items: center; padding: 80px 20px 32px; }
.logo { font-size: 50px; font-weight: 500; letter-spacing: -2px; margin-bottom: 10px; }
.logo span:nth-child(1){color:#4285F4}.logo span:nth-child(2){color:#EA4335}.logo span:nth-child(3){color:#FBBC05}.logo span:nth-child(4){color:#4285F4}.logo span:nth-child(5){color:#34A853}.logo span:nth-child(6){color:#EA4335}.logo span:nth-child(7){color:#4285F4}.logo span:nth-child(8){color:#EA4335}.logo span:nth-child(9){color:#FBBC05}.logo span:nth-child(10){color:#34A853}
.search-wrap { width:100%; max-width:580px; position:relative; margin-bottom:16px; }
.search-box { width:100%; height:46px; border-radius:24px; border:0.5px solid var(--color-border-secondary); background:var(--color-background-primary); padding:0 50px 0 20px; font-size:16px; color:var(--color-text-primary); outline:none; transition:box-shadow 0.15s; }
.search-box:focus { box-shadow:0 0 0 2px rgba(66,133,244,0.3); border-color:#4285F4; }
.s-icon { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:#4285F4; font-size:20px; cursor:pointer; }
.btn-row { display:flex; gap:10px; margin-top:4px; }
.g-btn { background:var(--color-background-secondary); border:0.5px solid var(--color-border-tertiary); border-radius:4px; padding:8px 18px; font-size:14px; color:var(--color-text-secondary); cursor:pointer; }
.g-btn:hover { border-color:var(--color-border-primary); background:var(--color-background-primary); }
.g-btn.primary { background:#4285F4; color:#fff; border-color:#4285F4; }

.config-box { display: none; }
.config-box label { font-size:11px; color:var(--color-text-tertiary); text-transform:uppercase; letter-spacing:0.4px; display:block; margin-bottom:4px; margin-top:10px; }

.config-box input { width:100%; height:32px; border-radius:6px; border:0.5px solid var(--color-border-secondary); background:var(--color-background-primary); padding:0 10px; font-size:12px; color:var(--color-text-primary); outline:none; font-family:var(--font-mono); }

.kp-row { display:flex; gap:7px; align-items:flex-start; margin-bottom:5px; font-size:13px; color:var(--color-text-secondary); }
.kp-row i { font-size:14px; color:var(--color-text-tertiary); margin-top:1px; flex-shrink:0; }

.chat-btn { display:inline-flex; align-items:center; gap:6px; background:var(--color-background-secondary); border:0.5px solid var(--color-border-secondary); border-radius:20px; padding:7px 14px; font-size:13px; color:var(--color-text-secondary); cursor:pointer; margin-top:12px; width:100%; justify-content:center; }
.chat-btn:hover { background:var(--color-background-primary); border-color:var(--color-border-primary); }

.chat-overlay { background:rgba(0,0,0,0.18); border-radius:var(--border-radius-lg); padding:16px; margin-top:16px; display:none; }
.chat-overlay.open { display:block; }
.chat-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.chat-head-t { font-size:14px; font-weight:500; color:var(--color-text-primary); display:flex; align-items:center; gap:6px; }
.chat-head-s { font-size:11px; color:var(--color-text-tertiary); }
.cclose { background:none; border:none; cursor:pointer; color:var(--color-text-secondary); font-size:16px; }
.chat-msgs { background:var(--color-background-primary); border-radius:var(--border-radius-md); padding:12px; min-height:120px; max-height:260px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
.msg { max-width:88%; padding:7px 11px; border-radius:12px; font-size:13px; line-height:1.5; }
.msg.bot { background:var(--color-background-secondary); color:var(--color-text-primary); border-bottom-left-radius:3px; align-self:flex-start; }
.msg.user { background:#4285F4; color:#fff; border-bottom-right-radius:3px; align-self:flex-end; }
.msg.thinking { color:var(--color-text-tertiary); font-style:italic; font-size:12px; }
.chat-inp-row { display:flex; gap:7px; }
.chat-inp { flex:1; height:34px; border-radius:17px; border:0.5px solid var(--color-border-secondary); background:var(--color-background-primary); padding:0 13px; font-size:13px; color:var(--color-text-primary); outline:none; }
.chat-inp:focus { border-color:#4285F4; }
.csend { width:34px; height:34px; border-radius:50%; background:#4285F4; color:#fff; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
.csend:disabled { background:var(--color-background-secondary); color:var(--color-text-tertiary); cursor:not-allowed; }

.loading-dots { display:inline-flex; gap:4px; align-items:center; }
.loading-dots span { width:5px; height:5px; border-radius:50%; background:var(--color-text-tertiary); animation:db 1.2s infinite; }
.loading-dots span:nth-child(2){animation-delay:0.2s}.loading-dots span:nth-child(3){animation-delay:0.4s}
@keyframes db{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

.err-msg { background:var(--color-background-danger); color:var(--color-text-danger); border-radius:var(--border-radius-md); padding:8px 12px; font-size:13px; margin-bottom:10px; display:none; }
</style>

<script>
const RESUME = {
  name: "Shubham Rangdal",
  title: "AI/ML Engineer & Data Scientist",
  email: "shubhamrangdal2000@gmail.com",
  phone: "9730208424",
  location: "Gujarat, India",
  linkedin: "www.linkedin.com/in/shubham-rangdal-685504203",
  github: "github.com/shubham",
  summary: "Skilled Software Developer with expertise in full-stack development, cloud solutions on Azure, and AI/ML integrations. Passionate about building intelligent applications using Azure AI Foundry.",
  experience: [
    { company: "Azure AI Projects", role: "AI Engineer", duration: "2023 - Present", desc: "Building AI agents using Azure AI Foundry. Developing intelligent resume and chatbot systems powered by GPT-4.1-mini." },
    { company: "Cloud Solutions Co.", role: "Full Stack Developer", duration: "2021 - 2023", desc: "Developed scalable web applications, REST APIs, and Azure cloud deployments." },
    { company: "Startup India", role: "Junior Developer", duration: "2019 - 2021", desc: "Built frontend interfaces with React and backend services with Node.js and Python." }
  ],
  education: [{ degree: "B.Tech Computer Engineering", school: "Gujarat Technological University", year: "2019" }],
  skills: ["Azure AI Foundry", "Python", "React", "Node.js", "TypeScript", "GPT-4", "REST APIs", "Docker", "Azure", "MongoDB", "FastAPI", "CI/CD"],
  projects: [
    { name: "Resume Agent", desc: "AI agent on Azure AI Foundry answering questions from resume using GPT-4.1-mini" },
    { name: "Cloud Dashboard", desc: "Real-time Azure monitoring dashboard with React and WebSockets" },
    { name: "AI Chatbot Platform", desc: "Multi-tenant chatbot builder using Azure OpenAI and agent references" }
  ]
};

function cfg(id) { return document.getElementById(id)?.value?.trim() || ''; }

async function callAzureAgent(userMessage, history = []) {
  const key = cfg('az-key');
  const endpoint = cfg('az-endpoint');
  const model = cfg('az-model') || 'gpt-4.1-mini';
  const agentName = cfg('az-agent') || 'shubham-resume-agent';
  const agentVersion = cfg('az-version') || '1';

  if (!key || !endpoint) return { text: "Please fill in the Azure API Key and Endpoint in the configuration panel.", error: true };

  const baseUrl = endpoint.replace(/\/$/, '');
  const url = `${baseUrl}/openai/v1/responses?api-version=2025-01-01-preview`;

  const systemContent = `You are an AI assistant for Shubham's resume. Answer questions about Shubham based on this data:
Name: ${RESUME.name} | Title: ${RESUME.title} | Location: ${RESUME.location}
Summary: ${RESUME.summary}
Experience: ${RESUME.experience.map(e=>`${e.role} at ${e.company} (${e.duration}): ${e.desc}`).join(' | ')}
Education: ${RESUME.education[0].degree} from ${RESUME.education[0].school}, ${RESUME.education[0].year}
Skills: ${RESUME.skills.join(', ')}
Projects: ${RESUME.projects.map(p=>`${p.name}: ${p.desc}`).join(' | ')}
Contact: ${RESUME.email} | ${RESUME.linkedin}
Be concise, friendly, and professional.`;

  const messages = [
    { role: "system", content: systemContent },
    ...history.slice(-6),
    { role: "user", content: userMessage }
  ];

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "api-key": key
      },
      body: JSON.stringify({
        model: model,
        input: messages,
        max_output_tokens: 400,
        extra_body: {
          agent_reference: { name: agentName, version: agentVersion, type: "agent_reference" }
        }
      })
    });

    const data = await res.json();

    if (!res.ok) {
      if (res.status === 401 || res.status === 403) return { text: "Authentication failed. Check your Azure API Key.", error: true };
      if (res.status === 404) return { text: "Endpoint not found. Verify your Azure endpoint URL and agent name.", error: true };
      return { text: `Azure API error ${res.status}: ${data.error?.message || JSON.stringify(data)}`, error: true };
    }

    const outputText = data.output_text
      || data.choices?.[0]?.message?.content
      || data.output?.map(o => o.content?.map(c => c.text).join('')).join('')
      || "No response from agent.";

    return { text: outputText, error: false };
  } catch (e) {
    return { text: `Network error: ${e.message}. Make sure CORS is enabled or use a proxy.`, error: true };
  }
}

function buildResults(query) {
  const q = query.toLowerCase();
  const results = [];
  results.push({
    fav: 'L', favClass: 'li',
    url: RESUME.linkedin,
    title: `${RESUME.name} — ${RESUME.title}`,
    snippet: `Official LinkedIn profile of <b>${RESUME.name}</b>. Connect to view professional experience, projects, achievements, and contact details.`,
    ai: true
  });
  results.push({
    fav: 'E', favClass: '',
    url: `mailto:${RESUME.email}`,
    title: `Contact ${RESUME.name} — Email & Phone`,
    snippet: `Get in touch with <b>${RESUME.name}</b>. Email: ${RESUME.email} | Phone: ${RESUME.phone}. Available for AI & Software Engineer roles.`,
    ai: false
  });
  return results;
}

function renderKP() {
  return `
    <div class="kp-av">SR</div>
    <div class="kp-name">${RESUME.name}</div>
    <div class="kp-role">${RESUME.title}</div>
    <div style="font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:6px;">${RESUME.summary.slice(0,110)}...</div>
    <div class="kp-sec">Contact</div>
    <div class="kp-row"><i class="ti ti-mail" aria-hidden="true"></i><span>${RESUME.email}</span></div>
    <div class="kp-row"><i class="ti ti-phone" aria-hidden="true"></i><span>${RESUME.phone}</span></div>
    <div class="kp-row"><i class="ti ti-map-pin" aria-hidden="true"></i><span>${RESUME.location}</span></div>
    <div class="kp-row"><i class="ti ti-brand-linkedin" aria-hidden="true"></i><span style="color:#4285F4">${RESUME.linkedin}</span></div>
    <div class="kp-sec">Skills</div>
    <div>${RESUME.skills.slice(0,8).map(s=>`<span class="kp-tag">${s}</span>`).join('')}</div>
    <div class="kp-sec">Education</div>
    <div class="kp-row"><i class="ti ti-school" aria-hidden="true"></i><span>${RESUME.education[0].degree}, ${RESUME.education[0].year}</span></div>
    <div class="kp-sec">Powered by</div>
    <div class="kp-row"><i class="ti ti-cloud" aria-hidden="true"></i><span style="color:#0078D4;font-size:12px">Azure AI Foundry · gpt-4.1-mini</span></div>
  `;
}

let activeTab = "All";

async function doSearch(query) {
  if (!query.trim()) return;
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';
  document.getElementById('r-search').value = query;
  document.getElementById('err-msg').style.display = 'none';

  const list = document.getElementById('results-list');
  const stats = document.getElementById('r-stats');
  list.innerHTML = `<div style="color:var(--color-text-tertiary);font-size:14px;padding:8px 0;"><div class="loading-dots"><span></span><span></span><span></span></div> Querying Azure AI Foundry agent...</div>`;
  stats.textContent = 'Searching...';
  document.getElementById('kp').innerHTML = renderKP();

  const t0 = Date.now();
  
  let promptText = `Generate a one-sentence search result snippet for query: "${query}" about Shubham's resume. Be factual and brief.`;
  if (activeTab === "Skills") {
    promptText = `List the technical skills of Shubham Rangdal based on his resume. Group them by category. Be factual and brief.`;
  } else if (activeTab === "Projects") {
    promptText = `Detail the projects completed by Shubham Rangdal based on his resume. Be factual and brief.`;
  } else if (activeTab === "Contact") {
    promptText = `Provide the contact details (email, phone, LinkedIn) of Shubham Rangdal based on his resume.`;
  }

  const aiResult = await callAzureAgent(promptText);
  const elapsed = ((Date.now() - t0) / 1000).toFixed(2);

  let results = buildResults(query);
  if (activeTab === "Skills" || activeTab === "Projects") {
    results = results.filter(r => r.fav === 'L');
  }

  if (!aiResult.error && aiResult.text) {
    if (results.length > 0) {
      results[0].snippet = aiResult.text;
    }
  }

  stats.textContent = `About ${results.length} results (${elapsed} seconds) · Azure AI Foundry`;

  if (aiResult.error) {
    const errEl = document.getElementById('err-msg');
    errEl.textContent = aiResult.text;
    errEl.style.display = 'block';
  }

  list.innerHTML = results.map(r => {
    let url = r.url;
    if (!url.startsWith('http') && !url.startsWith('mailto:')) {
      url = 'https://' + url;
    }
    return `
    <div class="result-card">
      <div class="result-url"><span class="fav ${r.favClass}">${r.fav}</span>${r.url}${r.ai ? ' <span style="font-size:11px;color:var(--color-text-tertiary)">· AI-generated</span>' : ''}</div>
      <a class="result-title" href="${url}" target="_blank">${r.title}</a>
      ${r.ai ? '<div class="ai-badge"><i class="ti ti-sparkles" style="font-size:11px" aria-hidden="true"></i> Azure AI Foundry response</div>' : ''}
      <div class="result-snippet">${r.snippet}</div>
    </div>
    `;
  }).join('');
}

const chatHistory = [];

async function sendChat() {
  const input = document.getElementById('chat-inp');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  const msgs = document.getElementById('chat-msgs');
  msgs.innerHTML += `<div class="msg user">${msg.replace(/</g,'&lt;')}</div>`;
  msgs.innerHTML += `<div class="msg bot thinking" id="thinking"><div class="loading-dots"><span></span><span></span><span></span></div> Asking Azure agent...</div>`;
  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('csend').disabled = true;

  chatHistory.push({ role: "user", content: msg });
  const result = await callAzureAgent(msg, chatHistory);

  document.getElementById('thinking')?.remove();
  chatHistory.push({ role: "assistant", content: result.text });

  msgs.innerHTML += `<div class="msg bot${result.error ? '' : ''}">${result.text.replace(/</g,'&lt;')}</div>`;
  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('csend').disabled = false;
}

document.getElementById('main-search-icon').addEventListener('click', () => doSearch(document.getElementById('main-search').value));
document.getElementById('main-search').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(e.target.value); });
document.getElementById('home-btn').addEventListener('click', () => doSearch(document.getElementById('main-search').value || 'Shubham developer Azure'));
document.getElementById('chat-home-btn').addEventListener('click', () => {
  doSearch('Shubham developer Azure AI');
  setTimeout(() => {
    document.getElementById('chat-overlay').classList.add('open');
    document.getElementById('toggle-chat-btn').style.display = 'none';
  }, 200);
});

document.getElementById('r-search-icon').addEventListener('click', () => doSearch(document.getElementById('r-search').value));
document.getElementById('r-search').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(e.target.value); });
document.getElementById('back-home').addEventListener('click', () => {
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('home-screen').style.display = 'flex';
  activeTab = "All";
  document.querySelectorAll('.r-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.r-tab')[0].classList.add('active');
});

document.querySelectorAll('.r-tab').forEach(tab => {
  tab.addEventListener('click', (e) => {
    document.querySelectorAll('.r-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    activeTab = e.target.textContent.trim();
    const currentQuery = document.getElementById('r-search').value;
    doSearch(currentQuery);
  });
});

document.getElementById('toggle-chat-btn').addEventListener('click', () => {
  document.getElementById('chat-overlay').classList.add('open');
  document.getElementById('toggle-chat-btn').style.display = 'none';
});
document.getElementById('chat-close').addEventListener('click', () => {
  document.getElementById('chat-overlay').classList.remove('open');
  document.getElementById('toggle-chat-btn').style.display = 'flex';
});
document.getElementById('csend').addEventListener('click', sendChat);
document.getElementById('chat-inp').addEventListener('keydown', e => { if(e.key==='Enter') sendChat(); });
</script>
